<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Core Diesel — Client Docs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f2f2f2;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .topbar {
      background: #1a1a1a;
      border-bottom: 3px solid #E8631A;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      height: 52px;
      gap: 0.75rem;
    }
    .topbar-logo {
      font-weight: 800;
      font-size: 15px;
      color: #E8631A;
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .topbar-logo span { color: #fff; }
    .topbar-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: #2a2a2a;
      color: #888;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid #333;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
    }

    .page-header {
      margin-bottom: 2rem;
    }
    .page-header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1a1a1a;
    }
    .page-header p {
      font-size: 0.875rem;
      color: #888;
      margin-top: 0.25rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, transform 0.15s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
      transform: translateY(-2px);
    }

    .card-thumb {
      background: #1a1a1a;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .card-thumb-icon {
      font-size: 3rem;
      opacity: 0.18;
    }
    .card-thumb-label {
      position: absolute;
      bottom: 10px;
      left: 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #E8631A;
      background: rgba(0,0,0,0.6);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .card-body {
      padding: 1rem 1.1rem 1.1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .card-title {
      font-size: 0.9375rem;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.3;
    }
    .card-desc {
      font-size: 0.8125rem;
      color: #666;
      line-height: 1.5;
    }
    .card-meta {
      margin-top: auto;
      padding-top: 0.6rem;
      font-size: 0.75rem;
      color: #aaa;
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="/" class="topbar-logo">Core<span>Diesel</span></a>
  <span class="topbar-badge">Client Docs</span>
</div>

<div class="page">
  <div class="page-header">
    <h1>Client Documents</h1>
    <p>Briefs, strategies and campaign references from Hedgehog Marketing.</p>
  </div>

  <div class="card-grid">

    <a href="/core-diesel-new-meta-ads.html" class="card">
      <div class="card-thumb">
        <div class="card-thumb-icon">📱</div>
        <span class="card-thumb-label">Meta Ads</span>
      </div>
      <div class="card-body">
        <div class="card-title">New Meta Ads — July 2026 Campaign</div>
        <div class="card-desc">Ad concepts, creative direction, copy, and campaign structure for the July 2026 Meta push.</div>
        <div class="card-meta">July 2026</div>
      </div>
    </a>

  </div>
</div>

</body>
</html>
